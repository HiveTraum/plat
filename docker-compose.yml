services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: plat
      POSTGRES_PASSWORD: plat
      POSTGRES_DB: plat
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plat"]
      interval: 5s
      timeout: 5s
      retries: 5

  kratos-migrate:
    image: oryd/kratos:v1.3.1
    command: migrate sql -e --yes
    environment:
      DSN: postgres://plat:plat@postgres:5432/kratos?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  kratos:
    image: oryd/kratos:v1.3.1
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    volumes:
      - ./kratos:/etc/config/kratos
    environment:
      DSN: postgres://plat:plat@postgres:5432/kratos?sslmode=disable
    ports:
      - "4433:4433"
      - "4434:4434"
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://plat:plat@postgres:5432/plat?sslmode=disable
      KRATOS_PUBLIC_URL: http://kratos:4433
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
