version: v0.13.0

dsn: postgres://plat:plat@postgres:5432/kratos?sslmode=disable

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://plat.ru
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
      exposed_headers:
        - Content-Type
        - Set-Cookie
  admin:
    base_url: http://localhost:4434/

selfservice:
  default_browser_return_url: http://plat.ru/
  allowed_return_urls:
    - http://plat.ru

  methods:
    password:
      enabled: true

  flows:
    login:
      ui_url: http://plat.ru/login
    registration:
      ui_url: http://plat.ru/registration
    settings:
      ui_url: http://plat.ru/settings
    error:
      ui_url: http://plat.ru/error

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

log:
  level: info
  format: json

session:
  cookie:
    domain: plat.ru
